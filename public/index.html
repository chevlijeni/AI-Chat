<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeni AI - Your Friendly AI Assistant</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <button id="newChatBtn" class="new-chat-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>
            <div class="history-title">Recent Chats</div>
            <ul class="chat-history-list" id="chatHistoryList">
                <!-- Chat history items will appear here -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="app-logo">
                    <div class="logo-icon"></div>
                    <h1>Jeni AI</h1>
                </div>
                <div class="status">
                    <span class="status-dot"></span> Online
                </div>
            </header>

            <section class="chat-window" id="chatWindow">
                <!-- Messages will appear here dynamically -->
            </section>

            <form class="chat-input-area" id="chatForm">
                <div class="input-center">
                    <div class="input-wrapper">
                        <textarea id="userInput" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
                        <button type="submit" id="sendBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js?v=4"></script>
</body>

</html>
