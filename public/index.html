<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Jeni AI - A premium, secure, and friendly AI assistant powered by Gemini. Experience seamless conversations with persistent chat history.">
    <title>Jeni AI - Your Friendly AI Assistant</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Custom Loading Screen -->
    <div id="initialLoader" class="initial-loader">
        <div class="loader-content">
            <div class="loader-logo">
                <div class="logo-pulse"></div>
            </div>
            <h2>Jeni AI</h2>
            <p id="loaderStatus">Initializing secure connection...</p>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
        </div>
    </div>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <button id="newChatBtn" class="new-chat-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>
            <div class="history-title">Recent Chats</div>
            <ul class="chat-history-list" id="chatHistoryList">
                <!-- Chat history items will appear here -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <button id="menuToggle" class="menu-toggle" title="Toggle Sidebar">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="app-logo">
                    <div class="logo-icon"></div>
                    <h1>Jeni AI</h1>
                </div>
                <div class="header-right">
                    <div class="status" id="connectionStatus">
                        <span class="status-dot"></span> Online
                    </div>
                    <div class="user-profile" id="userProfile" style="display: none;">
                        <img src="" alt="Avatar" id="userAvatar" class="avatar-img" referrerpolicy="no-referrer">
                        <span id="userName" class="user-name"></span>
                        <a href="/auth/logout" class="logout-btn" id="logoutBtn" title="Logout">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                        </a>
                    </div>
                </div>
            </header>

            <!-- Login Overlay -->
            <div id="loginOverlay" class="login-overlay" style="display: none;">
                <div class="login-card">
                    <h2>Welcome to Jeni AI</h2>
                    <p>Connect to continue your conversations and save history securely.</p>
                    <a href="/auth/github" class="btn-github">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path
                                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                        </svg>
                        Login with GitHub
                    </a>
                </div>
            </div>

            <section class="chat-window" id="chatWindow">
                <!-- Messages will appear here dynamically -->
            </section>

            <form class="chat-input-area" id="chatForm">
                <div class="input-center">
                    <div class="input-wrapper">
                        <textarea id="userInput" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
                        <button type="submit" id="sendBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js?v=5"></script>
</body>

</html>
